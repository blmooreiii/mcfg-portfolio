<link rel="stylesheet" href="https://use.typekit.net/olk5una.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --plum: #4A1942; --plum-deep: #2E0F29; --plum-mid: #6B2B61;
  --accent: #1E95B2; --accent-light: #48ADC4; --accent-pale: #D6E8F0;
  --cream: #FAF7F2; --sand: #F0EBE1; --ink: #140E12;
  --mid: #4A3F45; --light-border: rgba(74,25,66,0.12); --accent-border: rgba(30,149,178,0.25);
  --font-headline: "freightdispcmp-pro", serif;
  --font-body: "sirenne-eighteen-mvb", serif;
}
html { scroll-behavior: smooth; }
body { background: var(--cream); color: var(--ink); font-family: var(--font-body); font-weight: 400; overflow-x: hidden; }

/* ════════════════════════════════
   INTRO ANIMATION SCREEN
════════════════════════════════ */
#intro {
  position: fixed; inset: 0; z-index: 9999;
  background: #0B0609;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#intro.done { pointer-events: none; }

/* Vignette overlay */
#intro::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none; z-index: 2;
}

/* Canvas sits behind text */
#root-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

/* Light shaft overlay — renders above canvas, below text */
.light-shaft {
  position: absolute; top: -10%; left: 50%; transform: translateX(-50%);
  width: 600px; height: 70%;
  background: radial-gradient(ellipse 60% 100% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 80%);
  opacity: 0;
  pointer-events: none; z-index: 3;
}
.light-shaft-2 {
  position: absolute; top: -5%; left: 38%; width: 200px; height: 50%;
  background: radial-gradient(ellipse 40% 100% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 80%);
  opacity: 0;
  pointer-events: none; z-index: 3;
}
.light-shaft-3 {
  position: absolute; top: -5%; left: 58%; width: 150px; height: 45%;
  background: radial-gradient(ellipse 40% 100% at 50% 0%, rgba(240,220,160,0.08) 0%, transparent 80%);
  opacity: 0;
  pointer-events: none; z-index: 3;
}

/* Intro Quote */
#intro-quote {
  position: absolute; inset: 0; z-index: 5;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 0 40px; opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
}
.quote-text {
  font-family: var(--font-headline); font-size: clamp(18px, 2.8vw, 26px);
  color: var(--accent-pale); text-align: center; margin-bottom: 24px;
  max-width: 90%; line-height: 1.35; white-space: nowrap;
}
.quote-author {
  font-size: 13px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); width: 100%; max-width: 840px;
  text-align: right; margin-top: 12px;
}

/* Intro text */
.intro-text {
  position: relative; z-index: 4;
  text-align: center;
  opacity: 0;
  transform: translateY(12px);
}
.intro-text .intro-eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase;
  color: #C7C7C7; margin-bottom: 18px;
  display: block;
}
.intro-text .intro-name {
  font-family: var(--font-headline); font-weight: 700;
  font-size: clamp(28px, 5vw, 52px);
  color: var(--cream); letter-spacing: 0.04em;
  display: block; line-height: 1.2;
}
.intro-text .intro-name em {
  font-style: italic; color: var(--accent-light);
}

/* Intro exit — wipe upward */
#intro.exiting {
  animation: introExit 1s cubic-bezier(0.76, 0, 0.24, 1) forwards;
}
@keyframes introExit {
  0%   { clip-path: inset(0 0 0 0); opacity: 1; }
  100% { clip-path: inset(0 0 100% 0); opacity: 1; }
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  width: 100%; max-width: 1264px; margin: 0 auto; z-index: 1001; /* Elevated above overlay */
  display: flex; justify-content: space-between; align-items: center;
  padding: 22px 56px;
  background: rgba(250,247,242,0.94);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--light-border);
  opacity: 0; transition: opacity 0.6s 0.2s, transform 0.6s 0.2s;
}
nav.visible { opacity: 1; }
.nav-logo { display: flex; align-items: center; gap: 18px; }
.nav-logo-mark {
  width: 44px; height: 44px; background: var(--plum);
  display: flex; align-items: center; justify-content: center;
}
.nav-logo-mark span { font-family: var(--font-headline); font-weight: 700; font-size: 24px; color: var(--accent); font-style: italic; }
.nav-wordmark { font-family: var(--font-headline); font-weight: 700; font-size: 19px; letter-spacing: 0.04em; color: var(--plum); }
.nav-links { display: flex; gap: 48px; list-style: none; }
.nav-links a { font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--plum); }
.nav-cta { font-size: 11px; font-weight: 600; letter-spacing: 0.13em; text-transform: uppercase; padding: 11px 26px; background: var(--plum); color: var(--cream); text-decoration: none; transition: background 0.2s, transform 0.2s; }
.nav-cta:hover { background: var(--plum-deep); transform: translateY(-1px); }

/* Nav Toggle (Mobile) */
.nav-toggle {
  display: none;
  background: none; border: none; cursor: pointer;
  width: 24px; height: 18px;
  position: relative; z-index: 1001;
}
.nav-toggle span {
  display: block; width: 100%; height: 2px;
  background: var(--plum);
  position: absolute; left: 0;
  transition: transform 0.3s, top 0.3s, opacity 0.3s;
}
.nav-toggle span:first-child { top: 0; }
.nav-toggle span:last-child { top: 16px; }
.nav-toggle.active span:first-child { top: 8px; transform: rotate(45deg); }
.nav-toggle.active span:last-child { top: 8px; transform: rotate(-45deg); }

/* ════════════════════════════════
   MAIN SITE (hidden until intro done)
════════════════════════════════ */
#site { opacity: 0; transition: opacity 0.8s; max-width: 1264px; margin: 0 auto; background: var(--cream); position: relative; overflow-x: clip; }
#site.visible { opacity: 1; }

/* ════════════════════════════════
   HERO
════════════════════════════════ */
.hero {
  min-height: 100vh; position: relative; overflow: hidden; padding-top: 76px;
  background: linear-gradient(90deg, var(--cream) 55%, var(--plum) 55%);
}
.hero::after {
  content: ''; position: absolute; top: 0; right: 0; width: 45%; bottom: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none;
}
.hero-inner { position: relative; z-index: 2; min-height: calc(100vh - 76px); display: flex; flex-direction: column; }
.hero-meta-row { display: flex; justify-content: space-between; align-items: center; padding: 28px 56px 0; }
.hero-meta-left { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink); display: flex; align-items: center; gap: 16px; }
.hero-meta-left::before { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }
.hero-meta-right { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
.hero-tagline-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 56px 0; }
.hero-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; display: flex; align-items: center; gap: 14px; }
.hero-eyebrow::before { content: ''; display: block; width: 28px; height: 1px; background: var(--accent); }
.hero-h1 { font-family: var(--font-headline); font-weight: 700; font-size: clamp(52px, 7.5vw, 108px); line-height: 0.93; letter-spacing: -0.02em; margin-bottom: 0; }
.hero-h1 .h1-dark { color: var(--ink); display: block; }
.hero-h1 .h1-gold { color: var(--accent-light); display: block; font-style: italic; }
.hero-bottom { padding: 48px 56px 64px; display: grid; grid-template-columns: 55fr 45fr; gap: 0; }
.hero-bottom-left { padding-right: 0; display: flex; flex-direction: column; justify-content: flex-end; border-right: 1px solid var(--light-border); }
.hero-mission { font-size: 22px; font-weight: 300; line-height: 1.75; color: var(--mid); margin-bottom: 36px; max-width: 480px; }
.hero-mission strong { font-weight: 500; color: var(--plum); }
.hero-actions { display: flex; gap: 20px; align-items: center; }
.btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 15px 32px; background: var(--plum); color: var(--cream); font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: all 0.25s; }
.btn-primary:hover { background: var(--plum-deep); transform: translateY(-2px); }
.btn-primary .arrow { transition: transform 0.2s; }
.btn-primary:hover .arrow { transform: translateX(4px); }
.btn-text { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); text-decoration: none; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid transparent; padding-bottom: 2px; transition: color 0.2s, border-color 0.2s; }
.btn-text:hover { color: var(--plum); border-color: var(--plum); }
.hero-bottom-right { padding-left: 0; display: flex; flex-direction: column; justify-content: flex-end; }

/* Mosaic grid — 4 squares like Concept 1 */
.hero-mosaic {
  display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
  gap: 0; flex: 1; margin: 0 -56px 0 0;
  min-height: 320px;
}
.mosaic-cell {
  position: relative; overflow: hidden;
  background: rgba(255,255,255,0.05);
  transition: background 0.3s;
}
.mosaic-cell:nth-child(1) { background: rgba(201,168,76,0.14); }
.mosaic-cell:nth-child(2) { background: rgba(255,255,255,0.04); }
.mosaic-cell:nth-child(3) { background: rgba(255,255,255,0.07); }
.mosaic-cell:nth-child(4) { background: rgba(201,168,76,0.07); }
.mosaic-cell-inner {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(74,25,66,0.35));
}
/* Stat anchored in cell 1 */
.mosaic-stat {
  position: absolute; bottom: 32px; left: 32px; right: 32px;
}
.mosaic-stat-num {
  font-family: var(--font-headline); font-weight: 700;
  font-size: 48px; font-weight: 400; line-height: 1;
  color: var(--accent-light); display: block;
}
.mosaic-stat-label {
  font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.65); margin-top: 8px; display: block; line-height: 1.4;
}
/* Grid lines texture inside cells */
.mosaic-cell::before {
  content: '';
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}
/* Project list in cell 4 */
.mosaic-projects {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: center;
  padding: 20px 28px;
  gap: 0;
}
.mosaic-project-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
  cursor: pointer; transition: padding-left 0.2s;
  flex-shrink: 0;
}
.mosaic-project-item:last-child { padding-bottom: 0; border-bottom: none; }
.mosaic-project-item:first-child { border-top: none; }
.mosaic-project-item:hover { padding-left: 4px; }
.mosaic-project-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); line-height: 1.3; }
.mosaic-project-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(201,168,76,0.8); flex-shrink: 0; margin-left: 8px; }

/* ════════════════════════════════
   MISSION STRIP
════════════════════════════════ */
.mission-strip { display: grid; grid-template-columns: 1fr 2px 1fr; background: var(--plum); padding: 72px 56px; align-items: center; }
.mission-divider { background: rgba(255,255,255,0.1); height: 100%; }
.mission-left { padding-right: 64px; }
.mission-right { padding-left: 64px; }
.mission-kicker { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
.mission-kicker::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }
.mission-quote { font-family: var(--font-headline); font-weight: 700; font-size: clamp(22px, 2.5vw, 34px); font-weight: 400; color: var(--cream); line-height: 1.35; }
.mission-quote em { font-style: italic; color: var(--accent-light); }
.mission-body { font-size: 19px; line-height: 1.9; color: rgba(255,255,255,0.55); font-weight: 300; }

/* ════════════════════════════════
   PILLARS
════════════════════════════════ */
.pillars { padding: 100px 56px; }
.section-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
.section-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--accent); }
.section-heading { font-family: var(--font-headline); font-weight: 700; font-size: clamp(34px, 4vw, 52px); font-weight: 400; color: var(--plum); line-height: 1.15; margin-bottom: 64px; max-width: 560px; }
.pillars-grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--light-border); }
.pillar { padding: 52px 44px; border-right: 1px solid var(--light-border); position: relative; overflow: hidden; transition: background 0.3s; }
.pillar:last-child { border-right: none; }
.pillar:hover { background: white; }
.pillar-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); transform: scaleX(0); transform-origin: left; transition: transform 0.35s ease; }
.pillar:hover .pillar-accent { transform: scaleX(1); }
.pillar-num { font-family: var(--font-headline); font-weight: 700; font-size: 13px; font-style: italic; color: var(--accent); margin-bottom: 20px; display: block; }
.pillar-title { font-size: 17px; font-weight: 500; color: var(--plum); margin-bottom: 16px; }
.pillar-body { font-size: 18px; line-height: 1.85; color: var(--mid); font-weight: 300; }

/* ════════════════════════════════
   PROJECTS
════════════════════════════════ */
.projects { padding: 0 56px 100px; }
.projects-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--light-border); padding-bottom: 20px; margin-bottom: 0; }
.projects-count { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); }
.project-row { display: grid; grid-template-columns: 48px 1fr auto auto; align-items: center; gap: 40px; padding: 36px 0; border-bottom: 1px solid var(--light-border); cursor: pointer; position: relative; transition: padding-left 0.25s; }
.project-row::before { content: ''; position: absolute; left: -56px; right: -56px; top: 0; bottom: 0; background: var(--sand); opacity: 0; transition: opacity 0.2s; z-index: -1; }
.project-row:hover { padding-left: 12px; }
.project-row:hover::before { opacity: 1; }
.p-num { font-family: var(--font-headline); font-weight: 700; font-style: italic; font-size: 16px; color: var(--accent-border); transition: color 0.2s; }
.project-row:hover .p-num { color: var(--accent); }
.p-name { font-family: var(--font-headline); font-weight: 700; font-size: 28px; font-weight: 400; color: var(--plum); margin-bottom: 4px; }
.p-desc { font-size: 17px; color: var(--mid); line-height: 1.6; font-weight: 300; max-width: 520px; }
.p-type { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--mid); white-space: nowrap; }
.p-status { text-align: right; white-space: nowrap; }
.status-pill { display: inline-block; padding: 6px 16px; border-radius: 40px; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; border: 1px solid; }
.s-live { border-color: rgba(201,168,76,0.4); color: var(--accent); background: rgba(201,168,76,0.06); }
.s-build { border-color: var(--light-border); color: var(--mid); }
.s-disc { border-color: var(--light-border); color: rgba(122,107,115,0.5); }

/* ════════════════════════════════
   IMPACT NUMBERS
════════════════════════════════ */
.impact { background: var(--sand); padding: 80px 56px; display: grid; grid-template-columns: repeat(4, 1fr); border-top: 1px solid var(--light-border); border-bottom: 1px solid var(--light-border); }
.impact-cell { padding: 36px 32px; border-right: 1px solid var(--light-border); text-align: center; }
.impact-cell:last-child { border-right: none; }
.impact-num { font-family: var(--font-headline); font-weight: 700; font-size: 52px; color: var(--plum); line-height: 1; margin-bottom: 10px; }
.impact-label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); }

/* ════════════════════════════════
   BOARD PAGE
════════════════════════════════ */
.board-page { padding: 100px 56px; }
.board-intro { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: end; margin-bottom: 80px; }
.board-intro-right p { font-size: 19px; line-height: 1.9; color: var(--mid); font-weight: 300; }

.board-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.board-card {
  background: white; padding: 0;
  border: 1px solid var(--light-border);
  overflow: hidden; position: relative;
  transition: box-shadow 0.3s;
}
.board-card:hover { box-shadow: 0 8px 40px rgba(74,25,66,0.10); }

/* Monogram portrait area */
.board-portrait {
  height: 220px; background: var(--plum);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.board-portrait::before {
  content: '';
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
}
.board-portrait-alt { background: var(--plum-deep); }
.board-portrait-alt2 { background: var(--plum-mid); }
.board-monogram {
  font-family: var(--font-headline); font-weight: 700;
  font-size: 88px; font-style: italic;
  color: rgba(201,168,76,0.25);
  line-height: 1; position: relative; z-index: 1;
  user-select: none;
}
.board-role-badge {
  position: absolute; bottom: 16px; left: 16px; right: 16px;
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(4px);
  padding: 8px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.board-role-text { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }
.board-role-org { font-size: 10px; font-weight: 400; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); }

.board-body { padding: 32px; }
.board-name { font-family: var(--font-headline); font-weight: 700; font-size: 22px; font-weight: 400; color: var(--plum); margin-bottom: 4px; line-height: 1.2; }
.board-title { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
.board-bio { font-size: 17px; line-height: 1.85; color: var(--mid); font-weight: 300; }

/* Founder card — spans full width differently */
.board-card.founder { grid-column: 1 / -1; }
.board-card.founder .board-portrait { height: 180px; background: var(--accent); }
.board-card.founder .board-portrait::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(74,25,66,0.5), rgba(201,168,76,0.08));
}
.board-card.founder .board-layout { display: grid; grid-template-columns: 280px 1fr; }
.board-card.founder .board-portrait { height: 100%; min-height: 280px; }
.board-card.founder .board-body { padding: 48px; display: flex; flex-direction: column; justify-content: center; }
.board-card.founder .board-name { font-size: 32px; margin-bottom: 6px; }
.board-card.founder .board-bio { font-size: 18px; max-width: 640px; }
  
  /* Contributors Section */
  .contributors-section { margin-top: 120px; border-top: 1px solid var(--light-border); padding-top: 80px; }
  .contributors-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
  .contributor-card { background: white; border: 1px solid var(--light-border); display: flex; align-items: center; padding: 24px; transition: transform 0.3s; }

/* RESPONSIVE OVERRIDES (Early Stacking for Fluidity) */
@media (max-width: 1024px) {
  nav { padding: 18px 24px; left: 0; transform: none; width: 100%; max-width: none; }
  .nav-links {
    position: fixed; top: 0; right: 0; width: 300px; height: 100vh;
    display: flex; flex-direction: column; align-items: flex-start; 
    justify-content: flex-start; padding: 120px 40px;
    gap: 32px; z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
    box-shadow: -10px 0 30px rgba(0,0,0,0.15);
  }
  .nav-links::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(250, 247, 242, 0.9); /* Slightly more opaque glass */

    z-index: -1; border-left: 1px solid rgba(255,255,255,0.3);
  }
  .nav-links.active { transform: translateX(0); }
  .nav-overlay {
    position: fixed; inset: 0; background: rgba(11, 6, 9, 0.45);

  }
  .nav-overlay.active { opacity: 1; pointer-events: auto; }
  .nav-links a {

.modal-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(14,8,13,0.7);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  padding: 24px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--cream); max-width: 520px; width: 100%;
  padding: 56px 48px; position: relative;
  transform: translateY(20px); transition: transform 0.35s ease;
}
.modal-overlay.open .modal-box { transform: translateY(0); }
.modal-close {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; cursor: pointer;
  font-size: 20px; color: var(--mid); line-height: 1;
  padding: 4px 8px; transition: color 0.2s;
}
.modal-close:hover { color: var(--plum); }
.modal-eyebrow { font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
.modal-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }
.modal-title { font-family: var(--font-headline); font-weight: 700; font-size: 32px; color: var(--plum); line-height: 1.15; margin-bottom: 12px; }
.modal-title em { font-style: italic; }
.modal-body { font-size: 14px; line-height: 1.8; color: var(--mid); margin-bottom: 32px; }
.modal-form { display: flex; flex-direction: column; gap: 14px; }
.modal-input {
  width: 100%; padding: 14px 18px;
  border: 1px solid var(--light-border); background: white;
  font-family: var(--font-body); font-size: 15px; color: var(--ink);
  outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: rgba(74,63,69,0.45); }
.modal-submit {
  padding: 15px 32px; background: var(--plum); color: var(--cream);
  border: none; cursor: pointer;
  font-family: var(--font-body); font-size: 12px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  transition: background 0.2s, transform 0.2s;
}
.modal-submit:hover { background: var(--plum-deep); transform: translateY(-1px); }
.modal-success { display: none; text-align: center; padding: 20px 0; }
.modal-success-icon { font-size: 36px; margin-bottom: 16px; }
.modal-success h4 { font-family: var(--font-headline); font-weight: 700; font-size: 22px; color: var(--plum); margin-bottom: 10px; }
.modal-success p { font-size: 14px; color: var(--mid); line-height: 1.7; }
.modal-note { font-size: 11px; color: rgba(74,63,69,0.5); margin-top: 12px; text-align: center; letter-spacing: 0.04em; }
</head>

          <p>This endeavor is a lifetime in the making. I was taught early that if I could improve the lives of others, then I should. MCFG is the culmination of the lifelong influences of three people: my father (Bertram Moore, Jr), my mother (Viola Moore) and my aunt (Linda Gadson). </p>

<script>
/* ══════════════════════════════════════════
   ROOT + LIGHT ANIMATION
══════════════════════════════════════════ */
const canvas = document.getElementById('root-canvas');
const ctx = canvas.getContext('2d');

// Skip intro if already seen in this session
if (sessionStorage.getItem('mcfg_intro_seen')) {
  const intro = document.getElementById('intro');
  intro.style.display = 'none';
  intro.classList.add('done');
  document.getElementById('main-nav').classList.add('visible');
  document.getElementById('site').classList.add('visible');
  window.addEventListener('load', () => initReveal());
}


function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Branch system
const branches = [];
const W = () => canvas.width;
const H = () => canvas.height;

class Branch {
  constructor(x, y, angle, length, depth, delay) {
    this.x = x; this.y = y;
    this.angle = angle;
    this.maxLength = length;
    this.depth = depth;
    this.delay = delay; // ms before this branch starts growing
    this.progress = 0;
    this.growing = false;
    this.done = false;
    this.children = [];
    this.childrenSpawned = false;
    // Color: deeper roots = warmer brown, higher branches = gold-tinged
    const t = 1 - (depth / 8);
    const r = Math.round(60 + t * 100);
    const g = Math.round(30 + t * 60);
    const b = Math.round(20 + t * 20);
    this.color = `rgba(${r},${g},${b},`;
    this.width = Math.max(0.4, 2.5 - depth * 0.28);
  }

  start(t) {
    if (!this.growing && t >= this.delay) this.growing = true;
  }

  update(dt) {
    if (!this.growing || this.done) return;
    this.progress += dt * (0.0012 + Math.random() * 0.0004);
    if (this.progress >= 1) {
      this.progress = 1;
      this.done = true;
    }
    // Spawn children partway through
    if (this.progress > 0.75 && !this.childrenSpawned && this.depth < 7) {
      this.childrenSpawned = true;
      const spread = 0.28 + Math.random() * 0.18;
      const childLen = this.maxLength * (0.58 + Math.random() * 0.2);
      const childDelay = this.delay + this.maxLength / 0.9;
      if (Math.random() > 0.25) {
        this.children.push(new Branch(0, 0, this.angle - spread, childLen, this.depth + 1, childDelay));
      }
      if (Math.random() > 0.2) {
        this.children.push(new Branch(0, 0, this.angle + spread + (Math.random() * 0.15), childLen * 0.85, this.depth + 1, childDelay + 60));
      }
      if (this.depth < 3 && Math.random() > 0.5) {
        this.children.push(new Branch(0, 0, this.angle - spread * 0.3, childLen * 0.7, this.depth + 1, childDelay + 30));
      }
    }
  }

  draw(t, parentX, parentY) {
    if (!this.growing) return;
    // Compute tip position
    const len = this.maxLength * this.progress;
    const tipX = parentX + Math.cos(this.angle) * len;
    const tipY = parentY + Math.sin(this.angle) * len;

    ctx.beginPath();
    ctx.moveTo(parentX, parentY);
    ctx.lineTo(tipX, tipY);
    const alpha = Math.min(0.85, 0.3 + (1 - this.depth / 8) * 0.55);
    ctx.strokeStyle = this.color + alpha + ')';
    ctx.lineWidth = this.width;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Tiny dots at tips
    if (this.done && this.depth > 4) {
      ctx.beginPath();
      ctx.arc(tipX, tipY, 0.8, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(199,199,199,0.3)`;
      ctx.fill();
    }

    // Draw children from tip
    for (const child of this.children) {
      child.start(t);
      child.update(16);
      child.draw(t, tipX, tipY);
    }
  }
}

// Seed roots from bottom center, slightly spread
let startTime = null;
let rootsSeeded = false;
const roots = [];

function seedRoots() {
  const cx = W() * 0.5;
  const base = H() + 10;
  const angles = [
    -Math.PI / 2,
    -Math.PI / 2 - 0.22,
    -Math.PI / 2 + 0.22,
    -Math.PI / 2 - 0.5,
    -Math.PI / 2 + 0.5,
    -Math.PI / 2 - 0.08,
    -Math.PI / 2 + 0.08,
  ];
  const lens = [280, 220, 240, 180, 170, 260, 250];
  const delays = [0, 80, 80, 200, 200, 40, 40];

  angles.forEach((a, i) => {
    const r = new Branch(cx + (i - 3) * 28, base, a, lens[i], 0, delays[i]);
    r.growing = false;
    roots.push(r);
  });
}

/* ── Leaf system ── */
const allLeaves = [];
let leavesSpawned = false;
let leafSpawnTime = 0;

class Leaf {
  constructor(x, y, angle, spawnedAt) {
    this.x = x + (Math.random() - 0.5) * 22;
    this.y = y + (Math.random() - 0.5) * 22;
    this.rot = angle - Math.PI / 2 + (Math.random() - 0.5) * 1.6;
    this.w = 2.5 + Math.random() * 3.5;
    this.h = 5 + Math.random() * 7;
    this.maxScale = 0.8 + Math.random() * 0.6;
    this.delay = Math.random() * 800;
    this.spawnedAt = spawnedAt;
    const warm = Math.random();
    this.r = Math.round(185 + warm * 35);
    this.g = Math.round(185 + warm * 35);
    this.b = Math.round(185 + warm * 35);
  }

  draw(elapsed) {
    const age = elapsed - this.spawnedAt - this.delay;
    if (age <= 0) return;
    const t = Math.min(1, age / 900);
    const scale = (1 - Math.pow(1 - t, 3)) * this.maxScale;
    const alpha = scale * 0.78;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.scale(scale, scale);
    ctx.beginPath();
    ctx.moveTo(0, -this.h);
    ctx.bezierCurveTo( this.w, -this.h * 0.35,  this.w,  this.h * 0.35, 0,  this.h);
    ctx.bezierCurveTo(-this.w,  this.h * 0.35, -this.w, -this.h * 0.35, 0, -this.h);
    ctx.closePath();
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${alpha})`;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -this.h * 0.75);
    ctx.lineTo(0,  this.h * 0.75);
    ctx.strokeStyle = `rgba(${this.r - 18},${this.g - 18},${this.b},${alpha * 0.35})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.restore();
  }
}

function collectTips(branch, px, py, tips) {
  // Compute where THIS branch's tip actually is in screen space
  const len = branch.maxLength * branch.progress;
  const tx = px + Math.cos(branch.angle) * len;
  const ty = py + Math.sin(branch.angle) * len;

  if (branch.growing) {
    if (branch.children.length === 0) {
      // Terminal tip — always collect regardless of depth
      tips.push({ x: tx, y: ty, angle: branch.angle });
    } else if (branch.depth >= 3) {
      // Mid-branch node deep enough — also collect as a leaf site
      tips.push({ x: tx, y: ty, angle: branch.angle });
    }
  }

  // Recurse — pass THIS tip as the parent origin for children
  for (const child of branch.children) {
    collectTips(child, tx, ty, tips);
  }
}

function spawnLeaves(elapsed) {
  const tips = [];
  // Each root starts at its own (root.x, root.y) which is at the bottom edge
  // Children accumulate positions upward from there
  for (const root of roots) {
    collectTips(root, root.x, root.y, tips);
  }

  // Filter to only tips that are actually on screen (above the bottom third)
  const screenTips = tips.filter(t => t.y < H() * 0.75);
  const source = screenTips.length > 0 ? screenTips : tips;

  for (const tip of source) {
    const count = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      allLeaves.push(new Leaf(tip.x, tip.y, tip.angle, elapsed));
    }
  }
}

/* Light shaft fade-in timeline */
const LS1 = document.getElementById('ls1');
const LS2 = document.getElementById('ls2');
const LS3 = document.getElementById('ls3');
const introText = document.getElementById('intro-text');

function fadeEl(el, targetOpacity, durationMs, delayMs) {
  setTimeout(() => {
    el.style.transition = `opacity ${durationMs}ms ease`;
    el.style.opacity = targetOpacity;
  }, delayMs);
}

let animFrame;
let elapsed = 0;

function animate(ts) {
  if (!startTime) startTime = ts;
  elapsed = ts - startTime;

  ctx.clearRect(0, 0, W(), H());

  // Phase 1: Quote (0-5s)
  const quoteEl = document.getElementById('intro-quote');
  if (elapsed < 1000) {
    quoteEl.style.opacity = Math.min(1, elapsed / 1000);
  } else if (elapsed > 3000 && elapsed < 6000) {
    quoteEl.style.opacity = Math.max(0, 1 - (elapsed - 3000) / 3000);
  } else if (elapsed >= 6000) {
    quoteEl.style.display = 'none';
  } else if (elapsed >= 1000 && elapsed <= 3000) {
    quoteEl.style.opacity = 1;
  }

  // Phase 2: Tree (Starts at 3.5s - overlap with quote fade)
  const treeElapsed = elapsed - 3500;
  if (treeElapsed >= 0) {
    if (!rootsSeeded) { seedRoots(); rootsSeeded = true; }
    for (const root of roots) {
      root.start(treeElapsed);
      root.update(16);
      root.draw(treeElapsed, root.x, root.y);
    }

    // Light shafts appear at ~1.8s into tree phase (5300 total)
    if (treeElapsed > 1800 && LS1.style.opacity === '') {
      fadeEl(LS1, 1, 1400, 0);
      fadeEl(LS2, 1, 1200, 300);
      fadeEl(LS3, 1, 1000, 600);
    }

    // Leaves bloom at ~3.2s into tree phase (6700 total)
    if (treeElapsed > 3200 && !leavesSpawned) {
      leavesSpawned = true;
      spawnLeaves(treeElapsed);
    }
    for (const leaf of allLeaves) {
      leaf.draw(treeElapsed);
    }

    // Org name at ~3.5s into tree phase (7000 total)
    if (treeElapsed > 3500 && introText.style.opacity === '') {
      introText.style.transition = 'opacity 1.1s ease, transform 1.1s ease';
      introText.style.opacity = 1;
      introText.style.transform = 'translateY(0)';
    }
  }

  // Exit at ~11s total
  if (elapsed < 11000) {
    animFrame = requestAnimationFrame(animate);
  } else {
    exitIntro();
  }
}

function exitIntro() {
  const intro = document.getElementById('intro');
  intro.classList.add('exiting');
  sessionStorage.setItem('mcfg_intro_seen', 'true'); // Save state
  setTimeout(() => {
    intro.classList.add('done');
    intro.style.display = 'none';
    document.getElementById('main-nav').classList.add('visible');
    document.getElementById('site').classList.add('visible');
    initReveal();
  }, 1000);
}

// Kick off
requestAnimationFrame(animate);

/* ══════════════════════════════════════════
   PAGE SWITCHING
══════════════════════════════════════════ */
function showPage(id, el) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');

  // Match nav link
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.remove('active');
    const linkText = a.textContent.toLowerCase();
    if (id === 'home' && linkText === 'our work') a.classList.add('active');
    if (id === 'about' && linkText === 'about') a.classList.add('active');
    if (id === 'board' && linkText === 'board') a.classList.add('active');
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
  initReveal();
}

/* ══════════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════════ */
function initReveal() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
}

/* ══════════════════════════════════════════
   MOBILE MENU
══════════════════════════════════════════ */
const navToggle = document.getElementById('nav-toggle');
const navLinks = document.getElementById('nav-links');
const navOverlay = document.getElementById('nav-overlay');

function toggleMobileMenu() {
  if (window.innerWidth > 1024) return;
  navToggle.classList.toggle('active');
  navLinks.classList.toggle('active');
  navOverlay.classList.toggle('active');
  document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
}

if (navToggle) {
  navToggle.addEventListener('click', toggleMobileMenu);
}

// Skip animation on second visit
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === ' ') {
    if (document.getElementById('waitlist-modal').classList.contains('open')) {
      closeWaitlist();
    } else {
      cancelAnimationFrame(animFrame);
      exitIntro();
    }
  }
});

/* ══════════════════════════════════════════
   WAITLIST MODAL
══════════════════════════════════════════ */
function openWaitlist() {
  document.getElementById('waitlist-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeWaitlist() {
  document.getElementById('waitlist-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function submitWaitlist(e) {
  e.preventDefault();
  const name = document.getElementById('wl-name').value.trim();
  const email = document.getElementById('wl-email').value.trim();
  if (!name || !email) return;
  document.getElementById('wl-form').style.display = 'none';
  document.getElementById('wl-success').style.display = 'block';
}
document.getElementById('waitlist-modal').addEventListener('click', function(e) {
  if (e.target === this) closeWaitlist();
});
</script>

      <div class="modal-success-icon">🌿</div>
      <h4>You're on the list.</h4>
      <p>Thank you for believing in this work. We'll be in touch as soon as our 501(c)(3) status is confirmed and giving opens.</p>
    </div>
  </div>
</div>
